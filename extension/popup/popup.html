<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <h3>AutoApply</h3>
    <p class="muted" id="site"></p>

    <div id="foundry-section" class="foundry-section">
      <div class="section-title">Anthropic Foundry</div>
      <label>
        API key
        <input id="foundry-api-key" type="password" placeholder="ANTHROPIC_FOUNDRY_API_KEY" autocomplete="off" />
      </label>
      <label>
        Resource
        <input id="foundry-resource" type="text" placeholder="ANTHROPIC_FOUNDRY_RESOURCE" autocomplete="off" />
      </label>
      <label>
        Claude model
        <select id="foundry-model">
          <option value="sonnet">Sonnet</option>
          <option value="haiku">Haiku</option>
          <option value="claude-opus-4-6">Opus 4-6</option>
          <option value="claude-opus-4-7">Opus 4-7</option>
        </select>
      </label>
      <button id="foundry-save" class="secondary compact">Save Foundry settings</button>
      <p class="mini-status" id="foundry-status"></p>
    </div>

    <!-- Workday live status panel -->
    <div id="wd-panel" class="wd-panel hidden">
      <div class="status-row">
        <span id="status-dot" class="dot dot-gray"></span>
        <span id="status-label">Starting…</span>
      </div>
      <div id="verify-notice" class="verify-notice hidden">
        Check your email and click the verification link, then click
        <strong>Resume</strong> below.
      </div>
      <button id="pause" class="pause-btn secondary">Pause</button>
    </div>

    <!-- Gmail inbox section -->
    <div class="section-divider"></div>
    <div id="gmail-section">
      <div class="gmail-header">
        <span>📧 Gmail</span>
        <button id="gmail-fetch" class="gmail-fetch-btn">Check inbox</button>
      </div>
      <div id="gmail-status" class="gmail-status"></div>
      <ul id="gmail-list" class="gmail-list"></ul>
    </div>

    <button id="fill" class="primary">Auto-fill this page</button>
    <button id="clear" class="secondary">Clear highlights</button>
    <button id="options" class="link">Edit profile</button>
    <p class="status" id="msg"></p>
    <ul id="missing-list" class="missing-list"></ul>
  </div>
  <script src="popup.js"></script>
</body>
</html>
